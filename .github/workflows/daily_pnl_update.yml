name: Daily Tradetron PNL Update

on:
  schedule:
    # ── Hourly market-hours snapshots (IST = UTC+5:30), Mon-Fri ─────────────
    #  IST 09:15 -> UTC 03:45
    #  IST 10:15 -> UTC 04:45
    #  IST 11:15 -> UTC 05:45
    #  IST 12:15 -> UTC 06:45
    #  IST 13:15 -> UTC 07:45
    #  IST 14:15 -> UTC 08:45
    #  IST 15:15 -> UTC 09:45
    - cron: "45 3 * * 1-5"
    - cron: "45 4 * * 1-5"
    - cron: "45 5 * * 1-5"
    - cron: "45 6 * * 1-5"
    - cron: "45 7 * * 1-5"
    - cron: "45 8 * * 1-5"
    - cron: "45 9 * * 1-5"
    # ── End-of-day (3:16 PM IST -> 09:46 UTC) ────────────────────────────────
    - cron: "46 9 * * 1-5"
  workflow_dispatch:
    inputs:
      force_eod:
        description: 'Force EOD mode (updates Excel)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Hourly intraday snapshot
  # ════════════════════════════════════════════════════════════════════════════
  intraday-snapshot:
    name: "Intraday Snapshot (cards + Telegram)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.force_eod == 'false' ||
      github.event_name == 'schedule' && !startsWith(github.event.schedule, '46 9')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Step 1 -- Authenticate with Tradetron"
        id: auth
        env:
          TRADETRON_EMAIL:    ${{ secrets.TRADETRON_EMAIL }}
          TRADETRON_PASSWORD: ${{ secrets.TRADETRON_PASSWORD }}
        run: python tradetron_auth.py

      - name: "Step 2 -- Scrape live PNL"
        env:
          TRADETRON_SESSION: ${{ steps.auth.outputs.session_json }}
          EOD_MODE: "false"
        run: python tradetron_scraper.py

      - name: "Step 3 -- Generate strategy cards"
        run: python tradetron_screenshots.py

      - name: "Step 4 -- Send Telegram PNL snapshot"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS:  ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python tradetron_telegram_notifier.py

      - name: Done
        run: echo "Intraday snapshot complete -- $(date '+%Y-%m-%d %H:%M:%S UTC')"

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — End-of-day (also triggered by workflow_dispatch with force_eod=true)
  # ════════════════════════════════════════════════════════════════════════════
  eod-pnl-update:
    name: "EOD PNL Update (CSV + Drive + Excel + Telegram)"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.force_eod == 'true' ||
      github.event_name == 'schedule' && startsWith(github.event.schedule, '46 9')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Step 1 -- Authenticate with Tradetron"
        id: auth
        env:
          TRADETRON_EMAIL:    ${{ secrets.TRADETRON_EMAIL }}
          TRADETRON_PASSWORD: ${{ secrets.TRADETRON_PASSWORD }}
        run: python tradetron_auth.py

      - name: "Step 2 -- Scrape strategies, PNL & Capital"
        env:
          TRADETRON_SESSION: ${{ steps.auth.outputs.session_json }}
          EOD_MODE: "true"
        run: python tradetron_scraper.py

      - name: "Step 3 -- Upload CSV to Google Drive"
        env:
          GOOGLE_DRIVE_FOLDER_ID:  ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python google_drive_uploader.py

      - name: "Step 4 -- Update OneDrive Excel with PNL ROI data"
        env:
          MICROSOFT_CLIENT_ID:     ${{ secrets.MICROSOFT_CLIENT_ID }}
          MICROSOFT_CLIENT_SECRET: ${{ secrets.MICROSOFT_CLIENT_SECRET }}
          AZURE_REFRESH_TOKEN:     ${{ secrets.AZURE_REFRESH_TOKEN }}
        run: python onedrive_excel_updater.py

      - name: "Step 5 -- Generate strategy cards"
        run: python tradetron_screenshots.py

      - name: "Step 6 -- Send Telegram EOD PNL summary"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS:  ${{ secrets.TELEGRAM_CHAT_IDS }}
          EOD_MODE: "true"
        run: python tradetron_telegram_notifier.py

      - name: Done
        run: echo "EOD PNL update complete -- $(date '+%Y-%m-%d %H:%M:%S UTC')"